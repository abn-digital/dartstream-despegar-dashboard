name: Refresh Dashboard Data (Cube)

on:
  schedule:
    # Every day at 08:00 UTC (05:00 ART)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Query Cube and generate data.js
        env:
          CUBE_JWT_SECRET: ${{ secrets.CUBE_JWT_SECRET }}
        run: node scripts/fetch-cube.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "data: auto-refresh $(date -u +%Y-%m-%d) via Cube"
          git push
